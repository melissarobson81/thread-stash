<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melissa's Thread Stash</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--surface:#fff;--surface2:#f2f0ec;--border:#e0ddd8;--border-strong:#c8c4be;
  --text:#1a1917;--text2:#6b6864;--text3:#9b9895;
  --accent:#4a7c59;--accent-bg:#eef4f0;--accent-border:#b8d4c0;--accent-text:#2d5c3a;
  --danger:#c0392b;--danger-bg:#fdf0ef;
  --radius:8px;--shadow:0 1px 4px rgba(0,0,0,.08);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1917;--surface:#242220;--surface2:#2e2c29;--border:#3a3835;--border-strong:#504d49;
  --text:#f0ede8;--text2:#a09d98;--text3:#6b6864;
  --accent:#6aab7e;--accent-bg:#1e2e22;--accent-border:#3a6645;--accent-text:#8ecfa0;
  --danger:#e05c4e;--danger-bg:#2e1a18;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
h1{font-size:20px;font-weight:600;letter-spacing:-.02em}
.backup-note{font-size:11px;color:var(--text3);margin-top:3px}
.backup-note.stale{color:var(--danger)}
button{cursor:pointer;font-family:inherit;font-size:13px}
input,textarea,select{font-family:inherit;font-size:13px;color:var(--text)}
/* Layout */
.app{max-width:860px;margin:0 auto;padding:1.5rem 1rem 4rem}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px}
.top-actions{display:flex;gap:8px}
.section-label{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:.75rem}
.section-toggle{display:flex;align-items:center;gap:6px;background:none;border:none;padding:2px 0;cursor:pointer}
.chevron{display:inline-block;font-size:14px;color:var(--text3);transition:transform .15s}
.chevron.collapsed{transform:rotate(-90deg)}
#wipSection.collapsed,#threadSection.collapsed,#beadSection.collapsed,#fabricSection.collapsed,#shopSection.collapsed{display:none}
hr.div{border:none;border-top:1px solid var(--border);margin:2rem 0}
/* Buttons */
.btn{padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border-strong);background:var(--surface);color:var(--text);transition:background .12s}
.btn:hover{background:var(--surface2)}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-accent:hover{opacity:.9}
.btn-sm{padding:3px 10px;font-size:11px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text2)}
.btn-sm:hover{border-color:var(--border-strong);color:var(--text)}
.btn-danger{color:var(--danger);background:none;border:1px solid var(--border);font-size:12px;padding:4px 10px;border-radius:var(--radius)}
.btn-danger:hover{background:var(--danger-bg)}
/* WIP grid */
.wip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px;margin-bottom:2rem}
.wip-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s}
.fabric-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:box-shadow .15s,border-color .15s}
.fabric-card:hover{box-shadow:var(--shadow);border-color:var(--border-strong)}
.fabric-thumb{height:110px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;background-size:cover;background-position:center;border-bottom:1px solid var(--border)}
.fabric-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.55));padding:6px 8px 5px;display:flex;flex-direction:column;gap:1px}
.fabric-overlay-title{font-size:12px;font-weight:600;color:#fff;line-height:1.2}
.fabric-overlay-sub{font-size:10px;color:rgba(255,255,255,.85);line-height:1.3}
.fabric-info{padding:.55rem .8rem}
.fabric-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fabric-meta{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fabric-add{background:var(--surface);border:1px dashed var(--border-strong);border-radius:12px;height:156px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;color:var(--text3);font-size:12px;transition:border-color .12s}
.fabric-add:hover{border-color:var(--accent);color:var(--accent)}
.wip-card:hover{box-shadow:var(--shadow);border-color:var(--border-strong)}
.wip-thumb{height:88px;display:flex;align-items:center;justify-content:center;font-size:30px;position:relative;border-bottom:1px solid var(--border)}
.wip-thread-count{position:absolute;bottom:6px;right:8px;font-size:10px;background:rgba(0,0,0,.35);color:#fff;border-radius:20px;padding:1px 7px}
.wip-info{padding:.6rem .8rem}
.wip-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wip-meta{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wip-add{background:var(--surface);border:1px dashed var(--border-strong);border-radius:12px;height:134px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;color:var(--text3);font-size:12px;transition:border-color .12s}
.wip-add:hover{border-color:var(--accent);color:var(--accent)}
/* Thread list */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.filter-bar input{flex:1;min-width:150px;max-width:260px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text)}
.search-wrap{position:relative;flex:1;min-width:150px;max-width:260px}
.search-wrap input{width:100%;max-width:none;padding-right:26px}
.search-clear{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;padding:2px 4px;line-height:1;border-radius:50%}
.search-clear:hover{color:var(--text);background:var(--surface2)}
.filter-bar input:focus{outline:none;border-color:var(--accent)}
.brand-btn{padding:4px 12px;font-size:12px;border:1px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text2);transition:all .1s}
.brand-btn.active{background:var(--accent-bg);color:var(--accent-text);border-color:var(--accent-border)}
.thread-list-wrap{border:1px solid var(--border);border-radius:12px}
.thread-list-wrap .thread-row:first-child{border-top-left-radius:12px;border-top-right-radius:12px}
.thread-list-wrap .thread-row:last-child{border-bottom-left-radius:12px;border-bottom-right-radius:12px}
.thread-row{display:grid;grid-template-columns:1fr auto auto auto auto;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border);background:var(--surface);position:relative}
.thread-row:last-child{border-bottom:none}
.thread-row:hover{background:var(--surface2)}
.t-name{font-size:13px;font-weight:500}
.t-swatch{width:28px;height:28px;border-radius:6px;border:1px solid var(--border-strong);flex-shrink:0}
.t-swatch-placeholder{width:28px;height:28px;flex-shrink:0}
.t-row-main{display:flex;align-items:center;gap:10px}
.t-color{font-size:11px;color:var(--text3)}
.qty-ctrl{display:flex;align-items:center;gap:3px}
.qty-btn{width:22px;height:22px;border:1px solid var(--border);border-radius:4px;background:var(--surface2);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:15px;line-height:1;transition:background .1s}
.qty-btn:hover{background:var(--surface);border-color:var(--border-strong)}
.qty-val{font-size:13px;font-weight:500;min-width:20px;text-align:center}
/* Tooltip */
.tt{display:none;position:absolute;right:4px;top:calc(100% + 3px);background:var(--surface);border:1px solid var(--border-strong);border-radius:8px;padding:9px 13px;z-index:50;min-width:210px;box-shadow:0 4px 16px rgba(0,0,0,.12);font-size:12px;pointer-events:none}
.thread-row:hover .tt,.assign-item:hover .tt,.pill:hover .tt{display:block}
.tt-row{display:flex;justify-content:space-between;gap:12px;margin-bottom:3px;color:var(--text2)}
.tt-row:last-child{margin-bottom:0}
.tt-row strong{color:var(--text)}
/* Shopping list */
.shop-list-wrap{border:1px solid var(--border);border-radius:12px;overflow:hidden}
.shop-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border);background:var(--surface)}
.shop-row:last-child{border-bottom:none}
.shop-add{display:flex;gap:8px;padding:10px 12px;background:var(--surface2);border-top:1px solid var(--border)}
.shop-add input{flex:1;padding:5px 9px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text)}
.shop-add input:focus{outline:none;border-color:var(--accent)}
.btn-stash{padding:3px 10px;font-size:11px;background:var(--accent-bg);color:var(--accent-text);border:1px solid var(--accent-border);border-radius:4px}
.btn-stash:hover{background:var(--accent-border)}
.empty{padding:1.5rem;text-align:center;color:var(--text3);font-size:13px}
.badge{font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:1px 8px;color:var(--text2);margin-left:6px;vertical-align:middle}
/* Modal backdrop */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.modal-backdrop.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;width:min(560px,100%);position:relative}
.modal-header{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem}
.modal-thumb{width:56px;height:56px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:20px;color:var(--text3);line-height:1;padding:2px 6px}
.modal-close:hover{color:var(--text)}
.field{margin-bottom:.9rem}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text)}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* Assigned pills */
.pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;min-height:4px}
.pill{display:inline-flex;align-items:center;gap:4px;background:var(--accent-bg);color:var(--accent-text);border:1px solid var(--accent-border);border-radius:20px;padding:2px 10px;font-size:11px;position:relative}
.pill button{background:none;border:none;color:var(--accent-text);font-size:14px;line-height:1;padding:0;cursor:pointer}
/* Assign search */
.assign-search-wrap{position:relative}
.assign-search-wrap input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface2);color:var(--text)}
.assign-search-wrap input:focus{outline:none;border-color:var(--accent)}
.assign-dropdown{position:absolute;top:calc(100% + 3px);left:0;right:0;background:var(--surface);border:1px solid var(--border-strong);border-radius:8px;overflow:hidden;max-height:170px;overflow-y:auto;z-index:10;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.assign-item{padding:7px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border);position:relative}
.assign-item:last-child{border-bottom:none}
.assign-item:hover{background:var(--accent-bg)}
/* Color swatches */
.swatches{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.swatch{width:28px;height:28px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:border-color .1s}
.swatch.sel{border-color:var(--text)}
.tag-toggle{background:var(--surface2);border:1px solid var(--border)}
.tag-toggle.active{background:var(--accent-bg);color:var(--accent-text);border-color:var(--accent-border)}
.wip-tags{position:absolute;top:6px;left:6px;display:flex;gap:4px;flex-wrap:wrap}
.wip-tag-badge{font-size:9px;background:rgba(0,0,0,.4);color:#fff;border-radius:20px;padding:1px 6px;font-weight:500}
/* Tabs inside WIP modal */
.modal-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1rem}
.modal-tab{padding:6px 14px;font-size:12px;font-weight:500;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer}
.modal-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-panel{display:none}
.tab-panel.active{display:block}
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div>
      <h1>🪡 Melissa's Thread Stash</h1>
      <div id="lastBackupNote" class="backup-note"></div>
    </div>
    <div class="top-actions">
      <button class="btn btn-accent" onclick="driveSave()" id="driveSaveBtn">Save to Drive</button>
      <button class="btn" onclick="driveLoad()" id="driveLoadBtn">Load from Drive</button>
      <button class="btn" onclick="exportData()" title="Download a local backup file">Local backup</button>
      <button class="btn" onclick="triggerImport()" title="Restore from a local backup file">Local restore</button>
      <button class="btn" onclick="resetToDefaults()" title="Clear all data and reload your original thread list">Reset</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>

  <!-- WIPs -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:8px">
    <button class="section-toggle" onclick="toggleSection('wipSection')">
      <span class="chevron" id="wipSectionChevron">▾</span>
      <span class="section-label" style="margin-bottom:0">Works in progress</span>
    </button>
  </div>
  <div id="wipSection">
    <div class="wip-grid" id="wipGrid"></div>
  </div>

  <hr class="div">

  <!-- Inventory -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:8px">
    <button class="section-toggle" onclick="toggleSection('threadSection')">
      <span class="chevron" id="threadSectionChevron">▾</span>
      <span class="section-label" style="margin-bottom:0">Thread inventory <span class="badge" id="threadCount"></span></span>
    </button>
    <button class="btn btn-sm" onclick="openAddThread()">+ Add thread</button>
  </div>
  <div id="threadSection">
    <div class="filter-bar" id="threadFilterBar">
      <div class="search-wrap">
        <input type="text" id="searchBox" placeholder="Search by number or colour…">
        <button class="search-clear" id="searchClear" onclick="clearThreadSearch()" style="display:none">✕</button>
      </div>
      <button class="brand-btn active" data-brand="all">All</button>
    </div>
    <div class="thread-list-wrap" id="threadList"></div>
  </div>

  <hr class="div">

  <!-- Bead inventory -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:8px">
    <button class="section-toggle" onclick="toggleSection('beadSection')">
      <span class="chevron" id="beadSectionChevron">▾</span>
      <span class="section-label" style="margin-bottom:0">Bead inventory <span class="badge" id="beadCount"></span></span>
    </button>
    <button class="btn btn-sm" onclick="openAddBead()">+ Add bead</button>
  </div>
  <div id="beadSection">
    <div class="filter-bar" id="beadFilterBar">
      <div class="search-wrap">
        <input type="text" id="beadSearchBox" placeholder="Search beads…">
        <button class="search-clear" id="beadSearchClear" onclick="clearBeadSearch()" style="display:none">✕</button>
      </div>
      <button class="brand-btn active" data-beadbrand="all">All</button>
    </div>
    <div class="thread-list-wrap" id="beadList"></div>
  </div>

  <hr class="div">

  <!-- Fabric stash (card grid) -->
  <div id="fabricHeader" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:8px">
    <button class="section-toggle" onclick="toggleSection('fabricSection')">
      <span class="chevron" id="fabricSectionChevron">▾</span>
      <span class="section-label" style="margin-bottom:0">Fabric stash <span class="badge" id="fabricCount"></span></span>
    </button>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <div class="filter-bar" style="margin-bottom:0;gap:6px">
        <button class="brand-btn active" data-fabrictype="all">All</button>
        <button class="brand-btn" data-fabrictype="Aida">Aida</button>
        <button class="brand-btn" data-fabrictype="Linen">Linen</button>
        <button class="brand-btn" data-fabrictype="Evenweave">Evenweave</button>
        <button class="brand-btn" id="fabricAssignedToggle">Assigned</button>
      </div>
      <button class="btn btn-sm" onclick="openAddFabric()">+ Add fabric</button>
    </div>
  </div>
  <div id="fabricSection">
    <div class="wip-grid" id="fabricGrid"></div>
  </div>

  <hr class="div">

  <!-- Shopping list -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;flex-wrap:wrap;gap:8px">
    <button class="section-toggle" onclick="toggleSection('shopSection')">
      <span class="chevron" id="shopSectionChevron">▾</span>
      <span class="section-label" style="margin-bottom:0">Shopping list <span class="badge" id="shopCount"></span></span>
    </button>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-sm" onclick="openAddShopItem('thread')">+ Thread</button>
      <button class="btn btn-sm" onclick="openAddShopItem('bead')">+ Bead</button>
      <button class="btn btn-sm" onclick="openAddShopItem('fabric')">+ Fabric</button>
    </div>
  </div>
  <div id="shopSection">
    <div class="shop-list-wrap" id="shopList"></div>
    <div class="shop-add">
      <input type="text" id="shopInput" placeholder="Add anything else to buy…">
      <button class="btn btn-accent" onclick="addToShopManual()">Add</button>
    </div>
  </div>
</div>

<!-- WIP modal -->
<div class="modal-backdrop" id="wipModal">
  <div class="modal">
    <button class="modal-close" onclick="closeWipModal()">✕</button>
    <div class="modal-header">
      <div class="modal-thumb" id="mThumb">🪡</div>
      <div>
        <div style="font-size:17px;font-weight:600" id="mTitle">WIP</div>
        <div style="font-size:12px;color:var(--text3)" id="mMeta"></div>
      </div>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchTab('details')">Details</button>
      <button class="modal-tab" onclick="switchTab('threads')">Threads</button>
    </div>
    <!-- Details tab -->
    <div class="tab-panel active" id="tab-details">
      <div class="field"><label>Pattern name</label><input id="fName" oninput="wipField('name',this.value)"></div>
      <div class="field-row">
        <div class="field"><label>Designer</label><input id="fDesigner" oninput="wipField('designer',this.value)"></div>
        <div class="field"><label>Dimensions (w × h stitches)</label><input id="fDimensions" placeholder="e.g. 120 × 80" oninput="wipField('dimensions',this.value)"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Fabric</label><input id="fFabric" placeholder="e.g. 28ct evenweave" oninput="wipField('fabric',this.value)"></div>
        <div class="field"><label>Other notions</label><input id="fNotions" placeholder="e.g. 6" hoop, needle #24" oninput="wipField('notions',this.value)"></div>
      </div>
      <div class="field"><label>Notes</label><textarea id="fNotes" rows="3" style="resize:vertical" oninput="wipField('notes',this.value)"></textarea></div>
      <div class="field">
        <label>Photo URL <span style="text-transform:none;font-weight:400">(Google Drive share link works)</span></label>
        <input id="fPhotoUrl" placeholder="Paste a Google Drive or image link…" oninput="onPhotoUrlInput(this.value)">
        <div id="photoPreviewWrap" style="margin-top:8px;display:none">
          <img id="photoPreview" style="max-width:100%;max-height:160px;border-radius:8px;border:1px solid var(--border);display:block" onerror="onPhotoError()">
        </div>
        <div id="photoError" style="display:none;margin-top:6px;font-size:11px;color:var(--danger)">Couldn't load that image — make sure the Drive file's sharing is set to "Anyone with the link".</div>
      </div>
      <div class="field">
        <label>Tags</label>
        <div class="swatches" id="wipTags" style="gap:8px">
          <button type="button" class="btn-sm tag-toggle" data-tag="In progress" onclick="toggleTag('In progress')">In progress</button>
          <button type="button" class="btn-sm tag-toggle" data-tag="Kitted" onclick="toggleTag('Kitted')">Kitted</button>
        </div>
      </div>
      <div style="margin-top:1rem;display:flex;justify-content:space-between;align-items:center">
        <button class="btn-danger" onclick="deleteWip()">Remove WIP</button>
        <button class="btn btn-accent" onclick="closeWipModal()">Done</button>
      </div>
    </div>
    <!-- Threads tab -->
    <div class="tab-panel" id="tab-threads">
      <div class="field">
        <label>Assigned threads <span class="badge" id="assignBadge"></span></label>
        <div class="pills" id="assignedPills"></div>
        <div class="assign-search-wrap">
          <input type="text" id="assignSearch" placeholder="Search to assign a thread…" oninput="filterAssign(this.value)" autocomplete="off">

const LS_KEY = 'threadStash_v5';
let state = {threads:[], wips:[], shopList:[], beads:[], nextWipId:1, nextShopId:1, nextBeadId:8};

function loadState(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){
      state = JSON.parse(raw);
      if(!state.beads) state.beads = [];
      if(!state.nextBeadId) state.nextBeadId = 8;
      if(!state.threads) state.threads = [];
      if(!state.wips) state.wips = [];
      if(!state.shopList) state.shopList = [];
      if(!state.fabrics) state.fabrics = [];
    }
    // Seed defaults if threads/beads are missing entirely (fresh install or corrupted/empty save)
    if(!state.threads || state.threads.length === 0){
      state.threads = DEFAULT_THREADS.map((r,i)=>({id:i,brand:r[0],number:r[1],color:r[2],qty:r[3]}));
    }
    if(!state.beads || state.beads.length === 0){
      state.beads = DEFAULT_BEADS;
      state.nextBeadId = 8;
    }
    // Merge in any newly-added default threads/beads that aren't already present (matched by brand+number)
    const existingKeys = new Set(state.threads.map(t=>t.brand+'|'+t.number));
    let maxId = state.threads.reduce((m,t)=>Math.max(m,t.id),-1);
    DEFAULT_THREADS.forEach(r=>{
      const key = r[0]+'|'+r[1];
      if(!existingKeys.has(key)){
        maxId++;
        state.threads.push({id:maxId, brand:r[0], number:r[1], color:r[2], qty:r[3]});
        existingKeys.add(key);
      }
    });
    if(!state.nextWipId) state.nextWipId = 1;
    if(!state.nextShopId) state.nextShopId = 1;
    if(!state.nextBeadId) state.nextBeadId = 8;
    saveState();
  }catch(e){ console.warn('load failed',e); }
}

function saveState(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){ console.warn('save failed',e); }
}

const BACKUP_KEY = 'threadStash_lastBackup';
const DRIVE_FILE_NAME = 'thread_stash_backup.json';
const GAPI_CLIENT_ID = '521280393455-3j821g23hljo977bjigto6aodr8pr0im.apps.googleusercontent.com';
const GAPI_SCOPE = 'https://www.googleapis.com/auth/drive.file';

let gapiReady = false;
let gisReady = false;
let tokenClient = null;
let driveAccessToken = null;

// ── Google API initialisation ──────────────────────────
function initGapi(){
  gapi.load('client', async ()=>{
    await gapi.client.init({});
    await gapi.client.load('https://www.googleapis.com/discovery/v1/apis/drive/v3/rest');
    gapiReady = true;
    updateDriveButtons();
  });
}

function initGis(){
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GAPI_CLIENT_ID,
    scope: GAPI_SCOPE,
    callback: async (resp)=>{
      if(resp.error){ console.error('Auth error:', resp); return; }
      driveAccessToken = resp.access_token;
      gapi.client.setToken({access_token: driveAccessToken});
      updateDriveButtons();
      // If a pending action was queued, run it now
      if(pendingDriveAction){
        const action = pendingDriveAction;
        pendingDriveAction = null;
        action();
      }
    }
  });
  gisReady = true;
  updateDriveButtons();
}

let pendingDriveAction = null;

function ensureAuth(action){
  if(driveAccessToken){
    action();
  } else {
    pendingDriveAction = action;
    tokenClient.requestAccessToken({prompt:'consent'});
  }
}

function updateDriveButtons(){
  const saveBtn = document.getElementById('driveSaveBtn');
  const loadBtn = document.getElementById('driveLoadBtn');
  if(!saveBtn||!loadBtn) return;
  const ready = gapiReady && gisReady;
  saveBtn.disabled = !ready;
  loadBtn.disabled = !ready;
  saveBtn.title = ready ? 'Save to Google Drive' : 'Connecting to Google…';
  loadBtn.title = ready ? 'Load from Google Drive' : 'Connecting to Google…';
}

// ── Find or create the backup file in Drive ────────────
async function getDriveFileId(){
  const res = await gapi.client.drive.files.list({
    q: `name='${DRIVE_FILE_NAME}' and trashed=false`,
    spaces: 'drive',
    fields: 'files(id,name)'
  });
  const files = res.result.files;
  return files && files.length > 0 ? files[0].id : null;
}

// ── Save to Drive ──────────────────────────────────────
async function performDriveSave(){
  const content = JSON.stringify(state, null, 2);
  const blob = new Blob([content], {type:'application/json'});

  try{
    const fileId = await getDriveFileId();
    if(fileId){
      // Update existing file
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
        method:'PATCH',
        headers:{'Authorization':'Bearer '+driveAccessToken,'Content-Type':'application/json'},
        body: content
      });
    } else {
      // Create new file
      const meta = {name: DRIVE_FILE_NAME, mimeType:'application/json'};
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify(meta)],{type:'application/json'}));
      form.append('file', blob);
      await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method:'POST',
        headers:{'Authorization':'Bearer '+driveAccessToken},
        body: form
      });
    }
    recordBackupTimestamp();
    alert('✓ Saved to Google Drive');
  } catch(err){
    console.error(err);
    alert('Drive save failed: ' + err.message + '\n\nTry using Local backup instead.');
  }
}

function driveSave(){
  if(!gapiReady||!gisReady){ alert('Still connecting to Google — please wait a moment and try again.'); return; }
  ensureAuth(performDriveSave);
}

// ── Load from Drive ────────────────────────────────────
async function performDriveLoad(){
  try{
    const fileId = await getDriveFileId();
    if(!fileId){
      alert('No backup file found in your Google Drive yet. Save to Drive first to create one.');
      return;
    }
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
      headers:{'Authorization':'Bearer '+driveAccessToken}
    });
    const imported = await res.json();
    if(!imported.threads) throw new Error('File does not look like a valid Thread Stash backup.');
    if(confirm('Replace all current data with the backup from Google Drive?')){
      state = imported;
      if(!state.beads) state.beads=[];
      if(!state.nextBeadId) state.nextBeadId=8;
      saveState();
      recordBackupTimestamp();
      renderAll();
      alert('✓ Loaded from Google Drive');
    }
  } catch(err){
    console.error(err);
    alert('Drive load failed: ' + err.message + '\n\nTry using Local restore instead.');
  }
}

function driveLoad(){
  if(!gapiReady||!gisReady){ alert('Still connecting to Google — please wait a moment and try again.'); return; }
  ensureAuth(performDriveLoad);
}

// ── Local backup / restore (kept as fallback) ──────────
function formatBackupDate(iso){
  const d = new Date(iso);
  const dateStr = d.toLocaleDateString(undefined, {day:'numeric', month:'short', year:'numeric'});
  const timeStr = d.toLocaleTimeString(undefined, {hour:'numeric', minute:'2-digit'});
  return `${dateStr} at ${timeStr}`;
}

function renderBackupNote(){
  const el = document.getElementById('lastBackupNote');
  const iso = localStorage.getItem(BACKUP_KEY);
  if(!iso){
    el.textContent = 'No backup yet — use Save to Drive or Local backup';
    el.classList.add('stale');
    return;
  }
  const daysAgo = (Date.now() - new Date(iso).getTime()) / (1000*60*60*24);
  el.textContent = 'Last backed up: ' + formatBackupDate(iso);
  el.classList.toggle('stale', daysAgo > 14);
}

function recordBackupTimestamp(){
  localStorage.setItem(BACKUP_KEY, new Date().toISOString());
  renderBackupNote();
}

function exportData(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'thread_stash_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  recordBackupTimestamp();
}

function triggerImport(){ document.getElementById('importFile').click(); }

function importData(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const imported = JSON.parse(e.target.result);
      if(!imported.threads) throw new Error('Invalid file');
      if(confirm('Replace all current data with this backup?')){
        state = imported;
        saveState();
        recordBackupTimestamp();
        renderAll();
        alert('Import successful!');
      }
    }catch(err){ alert('Could not import: ' + err.message); }
  };
  reader.readAsText(file);
  evt.target.value='';
}

// ── Photo URL handling (Google Drive auto-convert) ────
function extractDriveFileId(url){
  let m = url.match(/drive\.google\.com\/file\/d\/([^/]+)/);
  if(m) return m[1];
  m = url.match(/drive\.google\.com\/open\?id=([^&]+)/);
  if(m) return m[1];
  m = url.match(/[?&]id=([^&]+)/);
  if(m && url.includes('drive.google.com')) return m[1];
  return null;
}

function toDirectImageUrl(url){
  if(!url) return '';
  url = url.trim();
  const fileId = extractDriveFileId(url);
  if(fileId) return `https://lh3.googleusercontent.com/d/${fileId}=w1000`;
  return url; // assume it's already a direct image URL
}

  img.dataset.rawUrl = rawUrl;
  img.dataset.triedFallback = '';
  img.src = toDirectImageUrl(rawUrl);
  wrap.style.display = 'block';
}

function onPhotoError(){
  const img = document.getElementById('photoPreview');
  const fileId = extractDriveFileId(img.dataset.rawUrl||'');
  if(fileId && !img.dataset.triedFallback){
    // First attempt (lh3) failed — try the legacy uc?export=view endpoint as a fallback
    img.dataset.triedFallback = '1';
    img.src = `https://drive.google.com/uc?export=view&id=${fileId}`;
    return;
  }
  document.getElementById('photoPreviewWrap').style.display='none';
  document.getElementById('photoError').style.display='block';
}

function getAssignedQty(tid){
  let n=0;
  state.wips.forEach(w=>{ if((w.assignedThreads||[]).includes(tid)) n++; });
  return n;
}
function getWipNames(tid){
  return state.wips.filter(w=>(w.assignedThreads||[]).includes(tid)).map(w=>w.name||'Untitled');
}

function threadTooltipHtml(t){
  const aq=getAssignedQty(t.id);
  const boxQ=Math.max(0,t.qty-aq);
  const wnames=getWipNames(t.id);
  return `<div class="tt">
    <div class="tt-row"><span>Total owned</span><strong>${t.qty}</strong></div>
    <div class="tt-row"><span>In thread box</span><strong>${boxQ}</strong></div>
    <div class="tt-row"><span>In WIPs</span><strong>${aq}${wnames.length?' ('+wnames.join(', ')+')':''}</strong></div>
  </div>`;
}

function getThreadHex(t){
  if(t.brand !== 'DMC') return null;
  const num = t.number.replace(/^0+(?=\d)/, ''); // strip leading zeros e.g. "01" -> "1"
  return DMC_HEX[t.number] || DMC_HEX[num] || null;
}

function getThreadColumn(t){
  if(t.brand !== 'DMC') return null;
  const num = t.number.replace(/^0+(?=\d)/, '');
  const col = DMC_COLUMN[t.number] ?? DMC_COLUMN[num];
  return col !== undefined ? col : null;
}

function renderThreads(){
  const el = document.getElementById('threadList');
  const q = searchQ.toLowerCase();
  const filtered = state.threads.filter(t=>{
    const bm = activeBrand==='all'
      || t.brand===activeBrand
      || (activeBrand==='Caron'&&t.brand.startsWith('Caron'))
      || (activeBrand==='Classic Colorworks'&&t.brand.startsWith('Classic'));
    const sm = !q||t.number.toLowerCase().includes(q)||t.color.toLowerCase().includes(q)||t.brand.toLowerCase().includes(q);
    const am = !threadAssignedOnly || getAssignedQty(t.id) > 0;
    return bm&&sm&&am;
  }).sort((a,b)=>{
    const brandCmp = a.brand.localeCompare(b.brand);
    if(brandCmp!==0) return brandCmp;
    const aNum = parseFloat(a.number), bNum = parseFloat(b.number);
    const aIsNum = !isNaN(aNum) && /^\d+$/.test(a.number);
    const bIsNum = !isNaN(bNum) && /^\d+$/.test(b.number);
    if(aIsNum && bIsNum) return aNum-bNum;
    return a.number.localeCompare(b.number, undefined, {numeric:true, sensitivity:'base'});
  });
  document.getElementById('threadCount').textContent = filtered.length + ' of ' + state.threads.length;
  if(!filtered.length){el.innerHTML='<div class="empty">No threads match</div>';return;}
  el.innerHTML = filtered.map(t=>{
    const hex = getThreadHex(t);
    const swatch = hex ? `<div class="t-swatch" style="background:#${hex}" title="#${hex}"></div>` : `<div class="t-swatch-placeholder"></div>`;
    return `<div class="thread-row">
      <div class="t-row-main">${swatch}<div><div class="t-name">${t.brand} ${t.number}</div><div class="t-color">${t.color}${getThreadColumn(t)!==null?' · '+getThreadColumn(t):''}</div></div></div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="chQty(${t.id},-1)">−</button>
        <span class="qty-val">${t.qty}</span>
        <button class="qty-btn" onclick="chQty(${t.id},1)">+</button>
      </div>
      <button class="btn-sm" onclick="addToShop(${t.id})">+ list</button>
      <button class="btn-sm" onclick="openEditThread(${t.id})">Edit</button>
      ${threadTooltipHtml(t)}
    </div>`;
  }).join('');
}

function chQty(id,delta){
  const t=state.threads.find(x=>x.id===id);
  if(t){ t.qty=Math.max(0,t.qty+delta); saveState(); renderThreads(); }
}

function addToShopManual(){

  const v=inp.value.trim(); if(!v) return;
  state.shopList.push({id:state.nextShopId++, type:'misc', label:v, subLabel:'', qty:1});
  inp.value=''; saveState(); renderShop();
}

function addToStash(sid){
  const s=state.shopList.find(x=>x.id===sid);
  if(!s){ state.shopList=state.shopList.filter(x=>x.id!==sid); saveState(); renderShop(); return; }
  if(s.type==='thread'){
    if(s.threadId!=null){
      const t=state.threads.find(x=>x.id===s.threadId);
      if(t){ t.qty += (s.qty||1); }
    } else {
      // find by brand+number
      const t=state.threads.find(x=>x.brand===s.brand && x.number===s.number);
      if(t){ t.qty += (s.qty||1); }
      else {
        const maxId=state.threads.reduce((m,x)=>Math.max(m,x.id),-1);
        state.threads.push({id:maxId+1, brand:s.brand||'', number:s.number||'', color:s.colour||'', qty:s.qty||1});
      }
    }
    renderThreads(); renderThreadFilterBar();
  } else if(s.type==='bead'){
    const b=state.beads.find(x=>x.brand===s.brand && x.number===s.number);
    if(b){ b.qty += (s.qty||1); }
    else {
      state.beads.push({id:state.nextBeadId++, brand:s.brand||'', number:s.number||'', name:s.name||'', size:s.size||'', qty:s.qty||1});
    }
    renderBeadFilterBar(); renderBeads();
  } else if(s.type==='fabric'){
    if(!state.fabrics) state.fabrics=[];
    const maxId=state.fabrics.reduce((m,x)=>Math.max(m,x.id),-1);
    state.fabrics.push({id:maxId+1, type:s.ftype||'', count:s.count||'', brand:s.brand||'', colour:s.colour||'', width:s.width||'', height:s.height||'', notes:'', qty:s.qty||1, photoUrl:''});
    renderFabric();
  }
  state.shopList=state.shopList.filter(x=>x.id!==sid);
  saveState(); renderShop();
}

function removeShop(sid){
  state.shopList=state.shopList.filter(x=>x.id!==sid);
  saveState(); renderShop();
}

function renderShop(){
  const el=document.getElementById('shopList');
  document.getElementById('shopCount').textContent=state.shopList.length;
  if(!state.shopList.length){el.innerHTML='<div class="empty">Nothing on the list yet</div>';return;}
  const typeIcon = {thread:'🧵', bead:'⚪', fabric:'⎕', misc:'📝'};
  el.innerHTML=state.shopList.map(s=>`
    <div class="shop-row">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <span style="font-size:16px;flex-shrink:0;margin-top:1px">${typeIcon[s.type]||'📝'}</span>
        <div>
          <div style="font-size:13px;font-weight:500">${s.label}</div>
          ${s.subLabel?`<div style="font-size:11px;color:var(--text3)">${s.subLabel}</div>`:''}
          ${(s.qty||1)>1?`<div style="font-size:11px;color:var(--text3)">Qty: ${s.qty}</div>`:''}
        </div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
        ${s.type!=='misc'?`<button class="btn-stash" onclick="addToStash(${s.id})">Add to stash</button>`:''}
        <button class="btn-sm" onclick="removeShop(${s.id})" style="color:var(--danger)">✕</button>
      </div>

}

function renderThreadFilterBar(){
  const bar = document.getElementById('threadFilterBar');
  const brands = getThreadBrands().filter(b=>state.threads.some(t=>t.brand===b));
  const allBtn = `<button class="brand-btn${activeBrand==='all'?' active':''}" data-brand="all">All</button>`;

  const clearBtn = hasActiveFilters ? `<button class="btn-sm" id="threadClearFilters">Clear filters</button>` : '';
  bar.querySelectorAll('.brand-btn,#threadClearFilters').forEach(b=>b.remove());
  bar.insertAdjacentHTML('beforeend', allBtn + brandBtns + assignedBtn + clearBtn);

function renderBeadFilterBar(){
  const bar = document.getElementById('beadFilterBar');

// ── Bead inventory ────────────────────────────────────
let activeBeadBrand = 'all';
let beadAssignedOnly = false;
let beadSearchQ = '';
let editBeadId = null;

function beadLabel(b){
  const parts = [b.brand];
  if(b.number) parts.push(b.number);
  if(b.name) parts.push(b.name);
  if(b.size) parts.push('(' + b.size + ')');
  return parts.join(' ');
}

function getBeadAssignedQty(bid){
  let n=0; state.wips.forEach(w=>{ if((w.assignedBeads||[]).includes(bid)) n++; }); return n;
}
function getBeadWipNames(bid){
  return state.wips.filter(w=>(w.assignedBeads||[]).includes(bid)).map(w=>w.name||'Untitled');
}

function beadTooltipHtml(b){
  const aq=getBeadAssignedQty(b.id);
  const boxQ=Math.max(0,b.qty-aq);
  const wnames=getBeadWipNames(b.id);
  return `<div class="tt">
    <div class="tt-row"><span>Total owned</span><strong>${b.qty}</strong></div>
    <div class="tt-row"><span>In bead box</span><strong>${boxQ}</strong></div>
    <div class="tt-row"><span>In WIPs</span><strong>${aq}${wnames.length?' ('+wnames.join(', ')+')':''}</strong></div>
  </div>`;
}

function renderBeads(){
  const el = document.getElementById('beadList');
  const q = beadSearchQ.toLowerCase();
  const filtered = state.beads.filter(b=>{
    const bm = activeBeadBrand==='all' || b.brand===activeBeadBrand;
    const sm = !q || b.name.toLowerCase().includes(q) || b.number.toLowerCase().includes(q) || b.brand.toLowerCase().includes(q);
    const am = !beadAssignedOnly || getBeadAssignedQty(b.id) > 0;
    return bm && sm && am;
  }).sort((a,b)=>{
    const brandCmp = a.brand.localeCompare(b.brand);
    if(brandCmp!==0) return brandCmp;
    return (a.number||a.name).localeCompare(b.number||b.name, undefined, {numeric:true, sensitivity:'base'});
  });
  document.getElementById('beadCount').textContent = filtered.length + ' of ' + state.beads.length;
  if(!filtered.length){el.innerHTML='<div class="empty">No beads match</div>';return;}
  el.innerHTML = filtered.map(b=>{
    const aq = getBeadAssignedQty(b.id);
    const boxQ = Math.max(0, b.qty - aq);
    const wnames = getBeadWipNames(b.id);
    const label = [b.number, b.name, b.size ? '('+b.size+')' : ''].filter(Boolean).join(' ');
    return `<div class="thread-row">
      <div>
        <div class="t-name">${b.brand}${b.number?' '+b.number:''}</div>
        <div class="t-color">${b.name||''}${b.size?' · '+b.size:''}</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="chBeadQty(${b.id},-1)">−</button>
        <span class="qty-val">${b.qty}</span>
        <button class="qty-btn" onclick="chBeadQty(${b.id},1)">+</button>
      </div>
      <button class="btn-sm" onclick="openEditBead(${b.id})">Edit</button>
      <div class="tt">
        <div class="tt-row"><span>Total owned</span><strong>${b.qty}</strong></div>
        <div class="tt-row"><span>In bead box</span><strong>${boxQ}</strong></div>
        <div class="tt-row"><span>In WIPs</span><strong>${aq}${wnames.length?' ('+wnames.join(', ')+')':''}</strong></div>
      </div>
    </div>`;
  }).join('');
}

function chBeadQty(id, delta){
  const b = state.beads.find(x=>x.id===id);
  if(b){ b.qty = Math.max(0, b.qty+delta); saveState(); renderBeads(); }
}

function getBeadBrands(){
  const known = ['Mill Hill','Miyuki Delica','No Brand'];
  const fromData = state.beads.map(b=>b.brand);
  return Array.from(new Set([...known, ...fromData])).sort((a,b)=>a==='No Brand'?1:b==='No Brand'?-1:a.localeCompare(b));
}

  return `<div class="tt">
    <div class="tt-row"><span>Total owned</span><strong>${f.qty}</strong></div>
    <div class="tt-row"><span>In stash</span><strong>${boxQ}</strong></div>
    <div class="tt-row"><span>In WIPs</span><strong>${aq}${wnames.length?' ('+wnames.join(', ')+')':''}</strong></div>
  </div>`;
}

function fabricLabel(f){
  const parts = [f.type, f.count ? f.count+'ct' : '', f.brand, f.colour, f.width&&f.height ? f.width+'×'+f.height+'cm' : ''];
  return parts.filter(Boolean).join(' · ');
}

function renderFabric(){
  const grid = document.getElementById('fabricGrid');
  const filtered = (state.fabrics||[]).filter(f=>{
    const tm = activeFabricType==='all' || f.type===activeFabricType;
    const am = !fabricAssignedOnly || getFabricAssignedQty(f.id) > 0;
    return tm&&am;
  }).sort((a,b)=>a.type.localeCompare(b.type)||parseInt(a.count)-parseInt(b.count)||(a.colour||'').localeCompare(b.colour||''));
  document.getElementById('fabricCount').textContent = filtered.length + ' of ' + (state.fabrics||[]).length;
  let html = filtered.map(f=>{
    const aq = getFabricAssignedQty(f.id);
    const size = f.width&&f.height ? f.width+'×'+f.height+'cm' : '';
    const subtitle = [f.brand, f.colour, size].filter(Boolean).join(' · ');
    const wipNames = getFabricWipNames(f.id);
    const imgUrl = f.photoUrl ? toDirectImageUrl(f.photoUrl) : '';
    const thumbStyle = imgUrl ? `background-image:url('${imgUrl}');background-size:cover;background-position:center` : `background:var(--surface2)`;
    const wipBadge = aq>0 ? `<span class="wip-thread-count">${aq} WIP${aq!==1?'s':''}</span>` : '';
    return `<div class="fabric-card" onclick="openEditFabric(${f.id})">
      <div class="fabric-thumb" style="${thumbStyle}">${imgUrl?'':'🧵'}
        ${wipBadge}
        <div class="fabric-overlay">
          <div class="fabric-overlay-title">${f.type}${f.count?' '+f.count+'ct':''}</div>
          ${subtitle?`<div class="fabric-overlay-sub">${subtitle}</div>`:''}
          ${f.qty>1?`<div class="fabric-overlay-sub">${f.qty} pieces</div>`:''}
        </div>
      </div>
      <div class="fabric-info">
        <div class="fabric-name">${f.colour||f.type}</div>
        <div class="fabric-meta">${f.brand||''}${f.notes?' · '+f.notes:''}</div>
      </div>
    </div>`;
  }).join('');
  html += `<div class="fabric-add" onclick="openAddFabric()"><span style="font-size:22px">＋</span><span>Add fabric</span></div>`;
  grid.innerHTML = html;
}

function onFabricTypeChange(){
  const type = document.getElementById('fType').value;
  const countSel = document.getElementById('fCount');
  const counts = FABRIC_COUNTS[type]||[];
  countSel.innerHTML = counts.map(c=>`<option value="${c}">${c}ct</option>`).join('');
}

function onFabricPhotoInput(val){
  const wrap = document.getElementById('fabricPhotoPreviewWrap');
  const img = document.getElementById('fabricPhotoPreview');
  const err = document.getElementById('fabricPhotoError');
  err.style.display='none';
  if(!val.trim()){wrap.style.display='none';return;}
  img.dataset.rawUrl=val.trim();
  img.dataset.triedFallback='';
  img.src=toDirectImageUrl(val.trim());
  wrap.style.display='block';
}

function onFabricPhotoError(){
  const img=document.getElementById('fabricPhotoPreview');
  const fileId=extractDriveFileId(img.dataset.rawUrl||'');
  if(fileId&&!img.dataset.triedFallback){
    img.dataset.triedFallback='1';
    img.src=`https://drive.google.com/uc?export=view&id=${fileId}`;
    return;
  }
  document.getElementById('fabricPhotoPreviewWrap').style.display='none';
  document.getElementById('fabricPhotoError').style.display='block';
}

function openAddFabric(){
  editFabricId = null;
  document.getElementById('fabricModalTitle').textContent = 'Add fabric';
  document.getElementById('deleteFabricBtn').style.display = 'none';
  document.getElementById('fType').value = 'Aida';
  onFabricTypeChange();
  document.getElementById('fBrand').value = '';
  document.getElementById('fColour').value = '';
  document.getElementById('fWidth').value = '';
  document.getElementById('fHeight').value = '';
  document.getElementById('fFabricNotes').value = '';
  document.getElementById('fFabricQty').value = 1;
  document.getElementById('fFabricPhotoUrl').value = '';
  document.getElementById('fabricPhotoPreviewWrap').style.display='none';
  document.getElementById('fabricPhotoError').style.display='none';
  document.getElementById('addFabricModal').classList.add('open');
}

function openEditFabric(id){
  editFabricId = id;
  const f=(state.fabrics||[]).find(x=>x.id===id);
  document.getElementById('fabricModalTitle').textContent = 'Edit fabric';
  document.getElementById('deleteFabricBtn').style.display = 'inline-block';
  document.getElementById('fType').value = f.type;
  onFabricTypeChange();
  document.getElementById('fCount').value = f.count||'';
  document.getElementById('fBrand').value = f.brand||'';
  document.getElementById('fColour').value = f.colour||'';
  document.getElementById('fWidth').value = f.width||'';
  document.getElementById('fHeight').value = f.height||'';
  document.getElementById('fFabricNotes').value = f.notes||'';
  document.getElementById('fFabricQty').value = f.qty||1;
  document.getElementById('fFabricPhotoUrl').value = f.photoUrl||'';
  onFabricPhotoInput(f.photoUrl||'');
  document.getElementById('addFabricModal').classList.add('open');
}

function saveFabric(){
  const type = document.getElementById('fType').value;
  const count = document.getElementById('fCount').value;
  const brand = document.getElementById('fBrand').value.trim();
  const colour = document.getElementById('fColour').value.trim();
  const width = document.getElementById('fWidth').value;
  const height = document.getElementById('fHeight').value;
  const notes = document.getElementById('fFabricNotes').value.trim();
  const qty = parseInt(document.getElementById('fFabricQty').value)||1;
  const photoUrl = document.getElementById('fFabricPhotoUrl').value.trim();
  if(!state.fabrics) state.fabrics=[];
  if(editFabricId!==null){
    const f=state.fabrics.find(x=>x.id===editFabricId);
    if(f) Object.assign(f,{type,count,brand,colour,width,height,notes,qty,photoUrl});
  } else {
    const maxId = state.fabrics.reduce((m,f)=>Math.max(m,f.id),-1);
    state.fabrics.push({id:maxId+1,type,count,brand,colour,width,height,notes,qty,photoUrl});
  }
  saveState(); closeFabricModal(); renderFabric();
}

function deleteFabric(){
  if(!confirm('Remove this fabric?')) return;
  state.fabrics=(state.fabrics||[]).filter(x=>x.id!==editFabricId);
  state.wips.forEach(w=>{ if(w.assignedFabrics) w.assignedFabrics=w.assignedFabrics.filter(x=>x!==editFabricId); });
  saveState(); closeFabricModal(); renderFabric();
}

function closeFabricModal(){
  document.getElementById('addFabricModal').classList.remove('open');
  editFabricId=null;
}

// ── Boot ──────────────────────────────────────────────
loadState();
renderAll();
renderBackupNote();
</script>
</body>
</html>
